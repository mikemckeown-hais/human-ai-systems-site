<svg width="420" height="420" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow aligned automatically to the connector direction -->
    <marker id="workflow-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#1F3A5F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g stroke="#1F3A5F" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Workflow nodes placed on exact centres -->
    <circle cx="28" cy="64" r="7"/>
    <circle cx="64" cy="40" r="7"/>
    <circle cx="64" cy="88" r="7"/>
    <circle cx="100" cy="64" r="7"/>

    <!-- Connectors built on exact geometry -->
    <!-- left node to top node -->
    <line x1="34" y1="60" x2="58" y2="44"/>

    <!-- top node to bottom node -->
    <line x1="64" y1="47" x2="64" y2="81"/>

    <!-- bottom node to right node with arrow aligned automatically -->
    <line x1="70" y1="84" x2="92" y2="69.33" marker-end="url(#workflow-arrow)"/>

  </g>
</svg>
